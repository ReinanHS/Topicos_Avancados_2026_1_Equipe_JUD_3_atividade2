services:
  db:
    image: postgres:17
    container_name: postgres_jud_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: jud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:26.0.3
    container_name: cloudbeaver_jud
    environment:
      CB_SERVER_NAME: "JUD Database"
      CB_SERVER_URL: "http://localhost:8978"
      CB_ADMIN_NAME: "cbadmin"
      CB_ADMIN_PASSWORD: "Admin123"
      CLOUDBEAVER_APP_ANONYMOUS_ACCESS_ENABLED: "true"
      CLOUDBEAVER_APP_GRANT_CONNECTIONS_ACCESS_TO_ANONYMOUS_TEAM: "true"
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
      - ./.docker/cloudbeaver/initial-data.conf:/opt/cloudbeaver/conf/initial-data.conf
      - ./.docker/cloudbeaver/data-sources.json:/opt/cloudbeaver/workspace/GlobalConfiguration/.dbeaver/data-sources.json
    restart: unless-stopped
    depends_on:
      - db

volumes:
  postgres_data:
  cloudbeaver_data:
